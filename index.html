<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Basics</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1 class="text-center">Hello, Bootstrap!</h1>

    <div class="container mt-5">
      <form class="needs-validation" novalidate>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="firstName" class="form-label">First Name</label>
            <input
              type="text"
              class="form-control"
              id="firstName"
              placeholder="Enter your first name"
            />
          </div>
          <div class="col-md-6 mb-3">
            <label for="lastName" class="form-label">Last Name</label>
            <input
              type="text"
              class="form-control"
              id="lastName"
              placeholder="Enter your last name"
            />
          </div>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Enter your email"
            required
          />
          <div class="invalid-feedback">
            Please enter a valid email address.
          </div>
          <div class="valid-feedback">Looks good.</div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Enter your password"
            minlength="8"
            required
          />
          <div class="invalid-feedback">
            Password must be at least 8 characters.
          </div>
          <div class="valid-feedback">Looks good.</div>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="terms" />
          <label class="form-check-label" for="terms"
            >I agree to the terms and conditions</label
          >
        </div>
        <button type="button" class="btn btn-success">Register</button>
      </form>

      <div class="table-responsive mt-5">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">First Name</th>
            <th scope="col">Last Name</th>
            <th scope="col">Email</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>

      <container-fluid class="bg-light p-3 mt-5">
         <image
        src="images/annie-spratt-9PXRUfRIH2A-unsplash.jpg" 
        class="img-fluid rounded mx-auto d-block"
        alt="Responsive image"
      />
      <image class="rounded-circle d-block mx-auto" src="images/20220918_164916.jpg" alt="Circle image" style="max-width: 150px; border-radius: 75px;" />
      </container-fluid>

      <button type="button" class="btn btn-secondary btn-lg position-fixed bottom-0 end-0 m-4 d-none" id="backToTop">Back to Top</button>
     
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (() => {
        "use strict";
        const forms = document.querySelectorAll(".needs-validation");
        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              form.classList.add("was-validated");
            },
            false,
          );
        });

        const backToTopButton = document.getElementById("backToTop");
        if (backToTopButton) {
          backToTopButton.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
          });

          const toggleBackToTopButton = () => {
            if (window.scrollY > 200) {
              backToTopButton.classList.add("d-md-block");
            } else {
              backToTopButton.classList.remove("d-md-block");
            }
          };

          window.addEventListener("scroll", toggleBackToTopButton);
          toggleBackToTopButton();
        }

        const users = [
          { firstName: "Ava", lastName: "Patel", email: "ava.patel@example.com" },
          { firstName: "Liam", lastName: "Johnson", email: "liam.johnson@example.com" },
          { firstName: "Noah", lastName: "Kim", email: "noah.kim@example.com" },
          { firstName: "Mia", lastName: "Garcia", email: "mia.garcia@example.com" },
          { firstName: "Ethan", lastName: "Nguyen", email: "ethan.nguyen@example.com" },
          { firstName: "Zoe", lastName: "Rivera", email: "zoe.rivera@example.com" }
        ];

        const userTableBody = document.getElementById("userTableBody");
        if (userTableBody) {
          userTableBody.innerHTML = users
            .map(
              (user, index) => `
                <tr>
                  <th scope="row">${index + 1}</th>
                  <td>${user.firstName}</td>
                  <td>${user.lastName}</td>
                  <td>${user.email}</td>
                </tr>
              `,
            )
            .join("");
        }
      })();
    </script>
  </body>
</html>
